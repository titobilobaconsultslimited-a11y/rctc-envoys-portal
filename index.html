<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCTC Envoys — Exam Portal Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .divider { display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--gray);font-size:0.82rem; }
    .divider::before,.divider::after { content:'';flex:1;height:1px;background:var(--border); }
  </style>
</head>
<body class="login-body">

  <div class="login-wrapper">

    <!-- Branding -->
    <div class="login-header-box">
      <div class="login-logos">
        <img src="Media/rcbc logo.png" alt="RCTC Logo" class="login-logo">
        <img src="Media/envoys logo.png" alt="Envoys Logo" class="login-logo">
        <img src="Media/YP20.jpg" alt="YP20 Logo" class="login-logo">
      </div>
      <h1>Redeemed Christian Theology College</h1>
      <h2>Envoys Campus</h2>
      <p>Online Examination Portal</p>
    </div>

    <!-- Student Login Card -->
    <div class="login-card">
      <h3>🎓 Student Login</h3>

      <div class="form-group">
        <label for="matricNo">Matric Number</label>
        <input
          type="text"
          id="matricNo"
          placeholder="e.g. 276379"
          autocomplete="off"
          spellcheck="false"
        >
      </div>

      <div id="loginError" class="error-msg hidden"></div>

      <button onclick="doStudentLogin()" class="btn btn-primary btn-full btn-lg">
        Login &rarr;
      </button>

      <div class="divider">or</div>

      <div class="admin-link" style="margin-bottom:10px;">
        <a href="sod-login.html">📖 School of Discipleship (SOD) Portal</a>
      </div>

      <div class="admin-link" style="margin-bottom:10px;">
        <a href="sit-login.html">🎖️ Envoys Stewards Training (EST) Portal</a>
      </div>

      <div class="admin-link">
        <a href="admin.html">🔒 Admin Dashboard Access</a>
      </div>
    </div>

    <!-- Footer note -->
    <p style="text-align:center;color:rgba(255,255,255,0.45);font-size:0.75rem;margin-top:18px;">
      For login issues, contact your examination administrator.
    </p>

  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Auto-redirect if already logged in
    if (store.sessionGet('rctc_student')) {
      window.location.href = 'dashboard.html';
    }

    const matricInput = document.getElementById('matricNo');

    // Auto-uppercase as user types
    matricInput.addEventListener('input', function () {
      const pos = this.selectionStart;
      this.value = this.value.toUpperCase();
      this.setSelectionRange(pos, pos);
    });

    matricInput.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') doStudentLogin();
    });

    function doStudentLogin() {
      hideError('loginError');
      const matric = matricInput.value.trim().toUpperCase();

      if (!matric) {
        showError('loginError', 'Please enter your matric number.');
        matricInput.focus();
        return;
      }

      if (!STUDENTS[matric]) {
        showError('loginError', 'Matric number not recognised. Please check and try again, or contact your administrator.');
        matricInput.select();
        return;
      }

      store.sessionSet('rctc_student', matric);
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
