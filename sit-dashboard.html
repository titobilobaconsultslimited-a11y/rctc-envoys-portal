<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCTC EST — My Exams</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header" id="siteHeader"></header>

  <!-- MAIN -->
  <main class="dashboard-main">

    <!-- Welcome Banner -->
    <div class="dashboard-welcome" id="welcomeBanner"></div>

    <!-- Resume In-Progress Exam Banner (shown if student was mid-exam) -->
    <div id="resumeBanner" style="display:none;background:#fff3cd;border:2px solid #f0ad4e;border-radius:10px;padding:16px 20px;margin-bottom:20px;align-items:center;gap:16px;flex-wrap:wrap;">
      <span style="font-size:1.5rem;">⚠️</span>
      <div style="flex:1;">
        <strong style="color:#7a4e00;font-size:0.95rem;">You have an in-progress exam!</strong>
        <p id="resumeBannerMsg" style="color:#7a4e00;font-size:0.85rem;margin:2px 0 0;"></p>
      </div>
      <button id="resumeBannerBtn" class="btn btn-primary" style="background:#e67e22;border-color:#e67e22;flex-shrink:0;">▶ Resume Exam</button>
      <button onclick="discardInProgressExam()" class="btn btn-outline" style="border-color:#e67e22;color:#e67e22;flex-shrink:0;font-size:0.82rem;">✖ Discard</button>
    </div>

    <!-- Exam Grid -->
    <p class="section-title">📚 Available Examinations</p>
    <div class="exam-grid" id="examGrid"></div>

    <!-- Theory Section -->
    <p class="section-title" style="margin-top:32px;">✍️ Theory Examinations</p>
    <div class="exam-grid" id="theoryGrid"></div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
  <script>
    // ---- AUTH CHECK ----
    const matric = requireSitStudentAuth();
    if (!matric) throw new Error('Not authenticated');

    const studentName = SIT_STUDENTS[matric] || store.sessionGet('rctc_sit_student_name') || matric;
    renderSitHeader(matric);

    // ---- Certificate data caches (populated in async init) ----
    const _mcqCertCache    = {};
    const _theoryCertCache = {};

    // ---- ASYNC INIT ----
    (async () => {
      const [studentResults, locks, theoryResults, theoryLocks] = await Promise.all([
        dbGetSitStudentResults(matric),
        dbGetSitLocks(),
        dbGetSitStudentTheoryResults(matric),
        dbGetSitTheoryLocks()
      ]);

      const completedCount = studentResults.length;
      const totalExams     = SIT_EXAMS.length;
      const pendingCount   = totalExams - completedCount;

      document.getElementById('welcomeBanner').innerHTML = `
        <div class="welcome-text">
          <h2>Welcome back, ${studentName}!</h2>
          <p>Select an exam below to begin. Each exam is timed once started.</p>
        </div>
        <div class="welcome-stats">
          <div class="stat-pill"><strong>${totalExams}</strong>Total Exams</div>
          <div class="stat-pill"><strong>${completedCount}</strong>Completed</div>
          <div class="stat-pill"><strong>${pendingCount}</strong>Remaining</div>
        </div>`;

      // ---- Detect in-progress exam and show resume banner ----
      const progress = getSitExamProgress();
      if (progress && progress.examId) {
        const inProgressExam    = SIT_EXAMS.find(e => e.id === progress.examId);
        const alreadySubmitted  = studentResults.find(r => r.examId === progress.examId);
        if (inProgressExam && !alreadySubmitted) {
          const elapsed  = Math.floor((Date.now() - progress.startTime) / 1000);
          const totalSec = (inProgressExam.duration || 60) * 60;
          const remSec   = Math.max(0, totalSec - elapsed);
          const remMin   = Math.floor(remSec / 60);
          const remSecR  = remSec % 60;
          const timeLeft = remSec > 0 ? `${remMin}m ${String(remSecR).padStart(2,'0')}s remaining` : 'Time may have expired';
          document.getElementById('resumeBannerMsg').textContent =
            `${inProgressExam.code} — ${inProgressExam.title}. ${timeLeft}.`;
          document.getElementById('resumeBannerBtn').onclick = () => {
            window.location.href = 'sit-exam.html?id=' + inProgressExam.id;
          };
          document.getElementById('resumeBanner').style.display = 'flex';
        } else if (alreadySubmitted) {
          clearSitExamProgress();
        }
      }

      // ---- BUILD MCQ EXAM CARDS ----
      const grid = document.getElementById('examGrid');

      if (SIT_EXAMS.length === 0) {
        grid.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--gray);">
            <div style="font-size:3rem;margin-bottom:16px;">📋</div>
            <h3 style="color:var(--navy);margin-bottom:8px;">No Exams Available Yet</h3>
            <p>Your exams will appear here once the administrator has added them.</p>
          </div>`;
      } else {
        SIT_EXAMS.forEach(exam => {
          const taken      = studentResults.find(r => r.examId === exam.id) || null;
          const examLocked = locks[exam.id] === true;
          const card = document.createElement('div');
          card.className = 'exam-card' + (taken ? ' completed' : '');

          let footerHTML;
          if (taken) {
            const pct   = Math.round((taken.score / taken.total) * 100);
            const grade = getGrade(pct);
            // Cache cert data so downloadDashCert can look it up safely
            _mcqCertCache[exam.id] = { examCode: exam.code, examTitle: exam.title, score: taken.score, total: taken.total, pct, grade: grade.label, dateTaken: taken.dateTaken };
            footerHTML = `
              <div class="score-display">
                <div class="score-pct">${pct}%</div>
                <div class="score-label">${taken.score}/${taken.total} correct &mdash; <span class="${grade.cls}" style="font-weight:700">${grade.label}</span></div>
              </div>
              <button class="btn btn-outline btn-full btn-sm" disabled>&#10003; Completed</button>
              <button class="btn btn-full btn-sm" style="margin-top:8px;background:#0d2a5e;color:#fff;" onclick="downloadDashCert(${exam.id}, 'mcq')">&#127891; Download Certificate</button>`;
          } else if (examLocked) {
            footerHTML = `
              <button class="btn btn-full" style="background:#6c757d;color:#fff;cursor:not-allowed;opacity:0.85;" disabled>
                &#128274; Locked by Admin
              </button>`;
          } else {
            footerHTML = `
              <button
                class="btn btn-primary btn-full"
                onclick="startExam(${exam.id})"
              >&#9654; Start Exam</button>`;
          }

          card.innerHTML = `
            <div class="card-top">
              <div class="card-icon">${exam.icon}</div>
              <span class="card-code">${exam.code}</span>
            </div>
            <div class="card-title">${exam.title}</div>
            <div class="card-meta">
              <span class="badge badge-navy">&#9201; ${exam.duration} min</span>
              <span class="badge badge-gray">&#128221; ${exam.questions.length} Questions</span>
              ${taken
                ? '<span class="badge badge-success">&#10003; Done</span>'
                : (examLocked
                    ? '<span class="badge" style="background:#fdecea;color:#e74c3c;">&#128274; Locked</span>'
                    : '<span class="badge badge-warning">Pending</span>')}
            </div>
            <div class="card-footer">${footerHTML}</div>`;

          grid.appendChild(card);
        });
      }

      // ---- BUILD THEORY CARDS ----
      const theoryGrid = document.getElementById('theoryGrid');
      if (SIT_THEORY_EXAMS.length === 0) {
        theoryGrid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--gray);">No theory exams available yet.</div>`;
      } else {
        SIT_THEORY_EXAMS.forEach(exam => {
          const taken      = theoryResults.find(r => r.examId === exam.id) || null;
          const examLocked = theoryLocks[exam.id] === true;
          const card = document.createElement('div');
          card.className = 'exam-card' + (taken ? ' completed' : '');

          let footerHTML;
          if (taken) {
            const pct   = taken.percentage;
            const grade = getGrade(pct);
            // Cache cert data so downloadDashCert can look it up safely
            _theoryCertCache[exam.id] = { examCode: exam.code, examTitle: exam.title, score: taken.score, total: taken.total, pct, grade: grade.label, dateTaken: taken.dateTaken };
            footerHTML = `
              <div class="score-display">
                <div class="score-pct">${pct}%</div>
                <div class="score-label">${taken.score}/${taken.total} marks &mdash; <span class="${grade.cls}" style="font-weight:700">${grade.label}</span></div>
              </div>
              <button class="btn btn-outline btn-full btn-sm" disabled>&#10003; Completed</button>
              <button class="btn btn-full btn-sm" style="margin-top:8px;background:#0d2a5e;color:#fff;" onclick="downloadDashCert(${exam.id}, 'theory')">&#127891; Download Certificate</button>`;
          } else if (examLocked) {
            footerHTML = `
              <button class="btn btn-full" style="background:#6c757d;color:#fff;cursor:not-allowed;opacity:0.85;" disabled>
                &#128274; Locked by Admin
              </button>`;
          } else {
            footerHTML = `
              <button class="btn btn-primary btn-full" onclick="startTheory(${exam.id})">&#9654; Start Theory</button>`;
          }

          card.innerHTML = `
            <div class="card-top">
              <div class="card-icon">${exam.icon}</div>
              <span class="card-code">${exam.code}</span>
            </div>
            <div class="card-title">${exam.title}</div>
            <div class="card-meta">
              <span class="badge badge-navy">&#9201; ${exam.duration} min</span>
              <span class="badge badge-gray">&#128221; ${exam.theoryQuestions.length} Questions</span>
              ${taken
                ? '<span class="badge badge-success">&#10003; Done</span>'
                : (examLocked
                    ? '<span class="badge" style="background:#fdecea;color:#e74c3c;">&#128274; Locked</span>'
                    : '<span class="badge badge-warning">Pending</span>')}
            </div>
            <div class="card-footer">${footerHTML}</div>`;

          theoryGrid.appendChild(card);
        });
      }

    })(); // end async IIFE

    // ---- START EXAM — global scope so onclick works ----
    async function startExam(examId) {
      const currentLocks = await dbGetSitLocks();
      if (currentLocks[examId] === true) {
        alert('This exam is currently locked by the administrator. Please check the timetable and try again at the scheduled time.');
        return;
      }
      clearSitExamProgress();
      saveSitExamProgress(examId, Date.now(), {});
      window.location.href = `sit-exam.html?id=${examId}`;
    }

    function discardInProgressExam() {
      if (confirm('Discard the in-progress exam? Your answers will be lost and you will need to start fresh.')) {
        clearSitExamProgress();
        document.getElementById('resumeBanner').style.display = 'none';
      }
    }

    async function startTheory(examId) {
      const currentLocks = await dbGetSitTheoryLocks();
      if (currentLocks[examId] === true) {
        alert('This theory exam is currently locked by the administrator.');
        return;
      }
      window.location.href = `sit-theory.html?id=${examId}`;
    }

    function downloadDashCert(examId, type) {
      const cache = type === 'mcq' ? _mcqCertCache : _theoryCertCache;
      const data  = cache[examId];
      if (!data) return;
      generateSitCertificate({
        studentName: SIT_STUDENTS[matric] || store.sessionGet('rctc_sit_student_name') || matric,
        matric,
        examCode:    data.examCode,
        examTitle:   data.examTitle,
        score:       data.score,
        total:       data.total,
        pct:         data.pct,
        grade:       data.grade,
        dateTaken:   data.dateTaken
      });
    }

  </script>
</body>
</html>
