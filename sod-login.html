<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCTC Envoys — SOD Exam Portal Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .divider { display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--gray);font-size:0.82rem; }
    .divider::before,.divider::after { content:'';flex:1;height:1px;background:var(--border); }
    .sod-badge {
      display: inline-block;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
  </style>
</head>
<body class="login-body">

  <div class="login-wrapper">

    <!-- Branding -->
    <div class="login-header-box">
      <div class="login-logos">
        <img src="Media/rcbc logo.png" alt="RCTC Logo" class="login-logo">
        <img src="Media/envoys logo.png" alt="Envoys Logo" class="login-logo">
      </div>
      <h1>Redeemed Christian Theology College</h1>
      <h2>Envoys Campus</h2>
      <p>School of Discipleship — Examination Portal</p>
    </div>

    <!-- SOD Student Login Card -->
    <div class="login-card">
      <div style="text-align:center;margin-bottom:4px;">
        <span class="sod-badge">School of Discipleship</span>
      </div>
      <h3>🎓 SOD Student Login</h3>

      <div class="form-group">
        <label for="matricNo">SOD Matric Number</label>
        <input
          type="text"
          id="matricNo"
          placeholder="e.g. SOD202670646"
          autocomplete="off"
          spellcheck="false"
        >
      </div>

      <div id="loginError" class="error-msg hidden"></div>

      <button onclick="doSodLogin()" class="btn btn-primary btn-full btn-lg">
        Login &rarr;
      </button>

      <div class="divider">or</div>

      <div class="admin-link">
        <a href="index.html">&#8592; Back to Main Portal</a>
      </div>
    </div>

    <!-- Footer note -->
    <p style="text-align:center;color:rgba(255,255,255,0.45);font-size:0.75rem;margin-top:18px;">
      For login issues, contact your examination administrator.
    </p>

  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Auto-redirect if already logged in
    if (store.sessionGet('rctc_sod_student')) {
      window.location.href = 'sod-dashboard.html';
    }

    const matricInput = document.getElementById('matricNo');

    // Auto-uppercase as user types
    matricInput.addEventListener('input', function () {
      const pos = this.selectionStart;
      this.value = this.value.toUpperCase();
      this.setSelectionRange(pos, pos);
    });

    matricInput.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') doSodLogin();
    });

    function doSodLogin() {
      hideError('loginError');
      const matric = matricInput.value.trim().toUpperCase();

      if (!matric) {
        showError('loginError', 'Please enter your SOD matric number.');
        matricInput.focus();
        return;
      }

      if (!SOD_STUDENTS[matric]) {
        showError('loginError', 'Matric number not recognised. Please check and try again, or contact your administrator.');
        matricInput.select();
        return;
      }

      store.sessionSet('rctc_sod_student', matric);
      window.location.href = 'sod-dashboard.html';
    }
  </script>

</body>
</html>
